<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F13 LMS Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebar">
    <h2>🎓 F13 LMS</h2>
    <div onclick="show('courses')">📚 Courses</div>
    <div onclick="show('create')">➕ Create Course</div>
    <div onclick="show('assign')">📋 Assign Course</div>
    <div onclick="show('quiz')">📝 Take Quiz</div>
    <div onclick="show('certificate')">🏆 Get Certificate</div>
    <div onclick="show('verify')">✅ Verify Certificate</div>
    <div onclick="show('dashboard')">📊 Skill Gap Dashboard</div>
</div>
<div class="main">
    <div id="courses" class="card section active">
        <h2>📚 All Courses</h2>
        <button onclick="getCourses()">Load Courses</button>
        <ul id="courseList"></ul>
    </div>
    <div id="create" class="card section">
        <h2>➕ Create Course</h2>
        <input id="title" placeholder="Course Title" />
        <input id="description" placeholder="Description" />
        <input id="video_url" placeholder="Video URL (YouTube/Vimeo)" />
        <input id="passing_score" placeholder="Passing Score (e.g. 70)" type="number" />
        <input id="assigned_roles" placeholder="Assigned Roles (comma separated e.g. engineer, hr)" />
        <button onclick="createCourse()">Create Course</button>
        <p id="createMsg" class="msg"></p>
    </div>
    <div id="assign" class="card section">
        <h2>📋 Assign Course</h2>
        <button onclick="loadCoursesForAssign()">Load Courses</button>
        <select id="courseDropdown"></select>
        <input id="employee_id" placeholder="Employee ID (e.g. emp1)" />
        <button onclick="assign()">Assign</button>
        <p id="assignMsg" class="msg"></p>
    </div>
    <div id="quiz" class="card section">
        <h2>📝 Take Quiz</h2>
        <input id="quizCourseId" placeholder="Course ID (e.g. course1)" />
        <input id="quizEmployeeId" placeholder="Employee ID (e.g. emp1)" />
        <button onclick="loadQuiz()">Load Quiz</button>
        <div id="quizQuestions"></div>
        <button id="submitQuizBtn" onclick="submitQuiz()" style="display:none;">Submit Quiz</button>
        <p id="quizMsg" class="msg"></p>
    </div>
    <div id="certificate" class="card section">
        <h2>🏆 Generate Certificate</h2>
        <input id="certEmployeeId" placeholder="Employee ID (e.g. emp1)" />
        <input id="certCourseId" placeholder="Course ID (e.g. course1)" />
        <button onclick="generateCert()">Generate Certificate</button>
        <p id="certMsg" class="msg"></p>
        <a id="certLink" href="#" target="_blank" style="display:none;">
            <button>Download Certificate</button>
        </a>
    </div>
    <div id="verify" class="card section">
        <h2>✅ Verify Certificate</h2>
        <input id="certId" placeholder="Certificate ID" />
        <button onclick="verifyCert()">Verify</button>
        <div id="verifyResult" style="margin-top:15px;"></div>
    </div>
    <div id="dashboard" class="card section">
        <h2>📊 Skill Gap Dashboard</h2>
        <button onclick="loadDashboard()">Load Dashboard</button>
        <div id="dashboardContent"></div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
