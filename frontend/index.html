<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
    <h2>🎓 LMS</h2>
    <div onclick="show('courses')">📚 Courses</div>
    <div onclick="show('create')">➕ Create Course</div>
    <div onclick="show('assign')">📋 Assign Course</div>
</div>
<div class="main">
    <!-- COURSES -->
    <div id="courses" class="card">
        <h2>All Courses</h2>
        <button onclick="getCourses()">Load Courses</button>
        <ul id="courseList"></ul>
    </div>
    <!-- CREATE COURSE -->
    <div id="create" class="card" style="display:none;">
        <h2>Create Course</h2>
        <input id="title" placeholder="Course Title" />
        <input id="description" placeholder="Description" />
        <input id="video_url" placeholder="Video URL (YouTube/Vimeo)" />
        <input id="passing_score" placeholder="Passing Score (e.g. 70)" type="number" />
        <input id="assigned_roles" placeholder="Assigned Roles (e.g. developer, hr)" />
        <button onclick="createCourse()">Create Course</button>
        <p id="createMsg" class="msg"></p>
    </div>
    <!-- ASSIGN -->
    <div id="assign" class="card" style="display:none;">
        <h2>Assign Course</h2>
        <button onclick="loadCoursesForAssign()">Load Courses</button>
        <select id="courseDropdown"></select>
        <input id="employee_id" placeholder="Employee ID" />
        <button onclick="assign()">Assign</button>
        <p id="assignMsg" class="msg"></p>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
